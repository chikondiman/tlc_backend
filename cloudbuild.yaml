steps:
  # Build and tag with both commit SHA and "latest"
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - ${_AR_IMAGE}:$COMMIT_SHA
      - -t
      - ${_AR_IMAGE}:latest
      - .

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_AR_IMAGE}']

  # Deploy to Cloud Run (pinned to the exact commit image)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - tlc-backend
      - --image=${_AR_IMAGE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=3
      - --memory=512Mi
      - --cpu=1
      - --concurrency=80
      - --timeout=60s

images:
  - ${_AR_IMAGE}:$COMMIT_SHA
  - ${_AR_IMAGE}:latest

substitutions:
  _REGION: us-central1
  # Set this in the Cloud Build trigger substitutions to match your Artifact Registry path:
  # europe-west1-docker.pkg.dev/savvy-437819/cloud-run-source-deploy/tlc_backend/tlc-backend
  _AR_IMAGE: europe-west1-docker.pkg.dev/savvy-437819/cloud-run-source-deploy/tlc_backend/tlc-backend

options:
  logging: CLOUD_LOGGING_ONLY
