steps:
  # Build and tag with both commit SHA and "latest"
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/tlc-backend:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/tlc-backend:latest
      - .

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/tlc-backend']

  # Deploy to Cloud Run (pinned to the exact commit image)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - tlc-backend
      - --image=gcr.io/$PROJECT_ID/tlc-backend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --concurrency=80
      - --timeout=60s
      - --set-cloudsql-instances=${_CLOUD_SQL_INSTANCE}

images:
  - gcr.io/$PROJECT_ID/tlc-backend:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/tlc-backend:latest

substitutions:
  _REGION: us-central1
  _CLOUD_SQL_INSTANCE: ''   # set in trigger: project:region:instance

options:
  logging: CLOUD_LOGGING_ONLY
